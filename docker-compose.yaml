services:
  train:
    build:
      context: .
    image: house-rent-predictions:latest
    command: ["python", "src/train.py"]
    volumes:
      - ./artifacts:/app/artifacts
      - ./data:/app/data
      - ./models:/app/models
    environment:
      PYTHONUNBUFFERED: "1"
    restart: "no"

  evaluate:
    image: house-rent-predictions:latest
    command: ["python", "src/evaluate.py"]
    volumes:
      - ./artifacts:/app/artifacts
      - ./data:/app/data
      - ./models:/app/models
    environment:
      PYTHONUNBUFFERED: "1"
    depends_on:
      train:
        condition: service_completed_successfully
    restart: "no"
    profiles: ["pipeline"]

  test:
    image: house-rent-predictions:latest
    command: ["pytest"]
    volumes:
      - ./models:/app/models:ro
    environment:
      PYTHONUNBUFFERED: "1"
    depends_on:
      train:
        condition: service_completed_successfully
    restart: "no"
    profiles: ["test"]

  web:
    image: house-rent-predictions:latest
    command: ["gunicorn", "--bind", "0.0.0.0:5000", "app.app:app"]
    ports:
      - "5000:5000"
    volumes:
      - ./models:/app/models:ro
    environment:
      PYTHONUNBUFFERED: "1"
    depends_on:
      train:
        condition: service_completed_successfully
    restart: "unless-stopped"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000')"]
      interval: 30s
      timeout: 5s
      retries: 3